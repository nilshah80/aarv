name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Check gofmt simplifications
        run: |
          unformatted="$(gofmt -s -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
          args: --timeout=5m

      # Advisory only: reports the most cyclomatically complex functions for
      # visibility. continue-on-error keeps it non-blocking — there is no agreed
      # complexity threshold, so it must never gate a release.
      - name: Advisory cyclomatic complexity (non-blocking)
        continue-on-error: true
        run: |
          echo "Advisory only — does not gate the build (no agreed threshold)."
          go run github.com/fzipp/gocyclo/cmd/gocyclo@v0.6.0 \
            -over 15 -top 25 -ignore 'examples|tests/benchmark' .
